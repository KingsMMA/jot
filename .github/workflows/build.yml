name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # required to publish release assets on a tag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: ./install/build-release.ps1

      - name: Stage installer
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/installer | Out-Null
          Copy-Item install/install.ps1, install/Install.cmd, install/uninstall.ps1 dist/installer/
          Compress-Archive -Path dist/installer/* -DestinationPath dist/Jot-installer.zip -Force

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jot-win-x64.zip
            dist/Jot-installer.zip
